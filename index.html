// Theme colors
// Theme engine - build palette from RGB
var themeRGB={r:74,g:94,b:42}; // default olive
function hexToRgb(hex){
  hex=hex.replace('#','');
  return {r:parseInt(hex.substr(0,2),16),g:parseInt(hex.substr(2,2),16),b:parseInt(hex.substr(4,2),16)};
}
function rgbToHex(r,g,b){return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);}
function lighten(r,g,b,f){return{r:Math.min(255,Math.round(r+(255-r)*f)),g:Math.min(255,Math.round(g+(255-g)*f)),b:Math.min(255,Math.round(b+(255-b)*f))};}
function darken(r,g,b,f){return{r:Math.round(r*f),g:Math.round(g*f),b:Math.round(b*f)};}
function buildTheme(r,g,b){
  var dk=darken(r,g,b,0.6);
  var lt=lighten(r,g,b,0.35);
  var vlt=lighten(r,g,b,0.7);
  return {
    s:rgbToHex(r,g,b),
    sl:rgbToHex(lt.r,lt.g,lt.b),
    sd:'rgba('+r+','+g+','+b+',0.1)',
    br:'rgba('+r+','+g+','+b+',0.2)',
    sf:'rgba(255,255,255,0.82)',
    cd:'rgba(255,255,255,0.72)',
    tx:rgbToHex(dk.r,dk.g,dk.b),
    mt:rgbToHex(Math.round((r+vlt.r)/2),Math.round((g+vlt.g)/2),Math.round((b+vlt.b)/2)),
    dm:rgbToHex(vlt.r,vlt.g,vlt.b),
    ok:'#5a8040',er:'#c4857a',wn:'#c4a855'
  };
}
var S=buildTheme(themeRGB.r,themeRGB.g,themeRGB.b);

// Extract dominant color from image
function extractColor(imgEl){
  return new Promise(function(resolve){
    try{
      var c=document.createElement('canvas');
      c.width=50;c.height=50;
      var ctx=c.getContext('2d');
      ctx.drawImage(imgEl,0,0,50,50);
      var data=ctx.getImageData(0,0,50,50).data;
      var rSum=0,gSum=0,bSum=0,count=0;
      for(var i=0;i<data.length;i+=4){
        var a=data[i+3];
        if(a<50)continue; // skip transparent
        var ri=data[i],gi=data[i+1],bi=data[i+2];
        var bright=(ri+gi+bi)/3;
        if(bright>240)continue; // skip white
        var sat=Math.max(ri,gi,bi)-Math.min(ri,gi,bi);
        if(sat<30)continue; // skip grey
        rSum+=ri;gSum+=gi;bSum+=bi;count++;
      }
      if(count>0)resolve({r:Math.round(rSum/count),g:Math.round(gSum/count),b:Math.round(bSum/count)});
      else resolve(null);
    }catch(e){resolve(null);}
  });
}

// ---- Card builder ----
function bCard(g,qrSrc){
  var fn=(cPrefix?cPrefix+" ":"")+g.name;
  var logo=cLogo||("data:image/png;base64,"+LOGO_B64);
  var qr=qrSrc||("https://api.qrserver.com/v1/create-qr-code/?size=130x130&data="+encodeURIComponent(g.id)+"&color="+themeRGB.r.toString(16).padStart(2,"0")+themeRGB.g.toString(16).padStart(2,"0")+themeRGB.b.toString(16).padStart(2,"0")+"&bgcolor=faf9f5&qzone=2");
  var bgStyle=cBg?'background:url("'+cBg+'") center/cover no-repeat;':"background:"+window._cardBg+";";
  return '<div class="ic" id="ic-'+g.id+'">'
    +'<div class="ib1" style="z-index:1"></div><div class="ib2" style="z-index:1"></div>'
    +'<div class="ico itl" style="z-index:1" style="border-top:1.5px solid '+S.sl+';border-left:1.5px solid '+S.sl+'"></div><div class="ico itr" style="border-top:1.5px solid '+S.sl+';border-right:1.5px solid '+S.sl+'"></div>'
    +'<div class="ico ibl" style="z-index:1" style="border-bottom:1.5px solid '+S.sl+';border-left:1.5px solid '+S.sl+'"></div><div class="ico ibr" style="border-bottom:1.5px solid '+S.sl+';border-right:1.5px solid '+S.sl+'"></div>'
    +'<div style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;z-index:1;position:relative">'
    +'<div style="width:100%;text-align:center">'
    +'<div class="igt" style="color:'+S.sl+';text-shadow:'+(cBg?'0 1px 2px rgba(255,255,255,0.6)':'none')+'">You are cordially invited</div>'
    +'<div class="ign" style="color:'+S.tx+';text-shadow:'+(cBg?'0 1px 3px rgba(255,255,255,0.8),0 0 8px rgba(255,255,255,0.6)':'none')+'">'+fn+'</div>'
    +'<div class="idv" style="background:linear-gradient(90deg,transparent,'+S.sl+',transparent)"></div></div>'
    +'<div class="ilo"><img src="'+logo+'" crossorigin="anonymous"/></div>'
    +'<div style="width:100%;text-align:center">'
    +'<div class="inm" style="color:'+S.s+';text-shadow:'+(cBg?'0 1px 2px rgba(255,255,255,0.7)':'none')+'">'+cGroom+' &nbsp;|&nbsp; '+cBride+'</div>'
    +'<div class="idt" style="color:'+S.sl+'">'+cDate+'</div>'
    +'<div class="iqr"><img src="'+qr+'" width="120" height="120" crossorigin="anonymous"/></div>'
    +'<div class="icn" style="color:'+S.sd.replace('0.1','0.4')+'">&#10022; &nbsp; &#10022; &nbsp; &#10022;</div>'
    +'</div></div></div>';
}

function applyCardBg(){
  if(!cBg)return;
  var cards=document.querySelectorAll('.ic');
  cards.forEach(function(card){
    card.style.backgroundImage='url('+cBg+')';
    card.style.backgroundSize='cover';

// ---- Generate QR matrix ----
function makeQRMatrix(data){
  try{
    var qr=qrcode(0,"M");
    qr.addData(data);
    qr.make();
    return {size:qr.getModuleCount(),isDark:function(r,c){return qr.isDark(r,c);}};
  }catch(e){return null;}
}

// ---- Draw entire card on canvas (no html2canvas, no CORS) ----
async function cardToCanvas(g){
  var W=800,H=1422; // 2x of 400x711
  var cvs=document.createElement("canvas");
  cvs.width=W;cvs.height=H;
  var ctx=cvs.getContext("2d");

  // 1. Background - use custom bg image or gradient
  if(cBg){
    await new Promise(function(res){
      var bgImg=new Image();
      bgImg.onload=function(){ctx.drawImage(bgImg,0,0,W,H);res();};
      bgImg.onerror=res;
      bgImg.src=cBg;
    });
  } else {
  var grad=ctx.createLinearGradient(0,0,W*0.6,H);
  var cr=themeRGB.r,cg=themeRGB.g,cb=themeRGB.b;
  grad.addColorStop(0,"rgb("+(Math.round(cr*0.04+255*0.96))+","+(Math.round(cg*0.04+255*0.96))+","+(Math.round(cb*0.04+255*0.96))+")");
  grad.addColorStop(0.4,"rgb("+(Math.round(cr*0.08+255*0.92))+","+(Math.round(cg*0.08+255*0.92))+","+(Math.round(cb*0.08+255*0.92))+")");
  grad.addColorStop(1,"rgb("+(Math.round(cr*0.13+255*0.87))+","+(Math.round(cg*0.13+255*0.87))+","+(Math.round(cb*0.13+255*0.87))+")");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  }

  // 2. Subtle radial blobs
  function blob(cx,cy,r,alpha){
    var rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0,"rgba("+themeRGB.r+","+themeRGB.g+","+themeRGB.b+","+alpha+")");
    rg.addColorStop(1,"rgba("+themeRGB.r+","+themeRGB.g+","+themeRGB.b+",0)");
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  }
  blob(-60,-60,280,0.15);blob(W+60,H+60,240,0.12);

  // 3. Corner brackets
  ctx.strokeStyle="rgba("+themeRGB.r+","+themeRGB.g+","+themeRGB.b+",0.35)";ctx.lineWidth=2.5;
  var m=32,s=80;
  // TL
  ctx.beginPath();ctx.moveTo(m+s,m);ctx.lineTo(m,m);ctx.lineTo(m,m+s);ctx.stroke();
  // TR
  ctx.beginPath();ctx.moveTo(W-m-s,m);ctx.lineTo(W-m,m);ctx.lineTo(W-m,m+s);ctx.stroke();
  // BL
  ctx.beginPath();ctx.moveTo(m+s,H-m);ctx.lineTo(m,H-m);ctx.lineTo(m,H-m-s);ctx.stroke();
  // BR
  ctx.beginPath();ctx.moveTo(W-m-s,H-m);ctx.lineTo(W-m,H-m);ctx.lineTo(W-m,H-m-s);ctx.stroke();

  // 4. "YOU ARE CORDIALLY INVITED"
  ctx.textAlign="center";
  ctx.font="600 18px 'Cinzel',serif";
  ctx.fillStyle=S.sl;
  ctx.letterSpacing="4px";
  ctx.fillText("YOU ARE CORDIALLY INVITED",W/2,180);

  // 5. Guest name
  var fn=(cPrefix?cPrefix+" ":"")+g.name;
  ctx.font="bold 38px 'Cinzel',serif";
  ctx.fillStyle=S.tx;
  ctx.letterSpacing="2px";
  // Scale down if too long
  var tw=ctx.measureText(fn).width;
  if(tw>W-120){ctx.font="bold "+(38*((W-120)/tw))+"px 'Cinzel',serif";}
  ctx.fillText(fn,W/2,240);

  // 6. Divider line
  ctx.strokeStyle=S.sl+"80";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2-60,270);ctx.lineTo(W/2+60,270);ctx.stroke();

  // 7. Logo (load as image)
  var logoSrc=cLogo||("data:image/png;base64,"+LOGO_B64);
  await new Promise(function(res){
    var img=new Image();
    img.onload=function(){
      var lw=170,lh=255;
      ctx.globalAlpha=0.8;
      ctx.drawImage(img,W/2-lw/2,320,lw,lh);
      ctx.globalAlpha=1;
      res();
    };
    img.onerror=res;
    img.src=logoSrc;
  });

  // 8. Names and date
  ctx.font="500 28px 'Cinzel',serif";
  ctx.fillStyle=S.s;
  ctx.letterSpacing="4px";
  ctx.fillText(cGroom+" \u00a0|\u00a0 "+cBride,W/2,700);
  ctx.font="400 24px 'Cinzel',serif";
  ctx.fillStyle=S.sl;
  ctx.letterSpacing="3px";
  ctx.fillText(cDate,W/2,745);

  // 9. QR code (draw from matrix)
  var mat=makeQRMatrix(g.id);
  if(mat){
    var qrSize=mat.size;
    var cell=8;
    var qrPx=qrSize*cell;
    var qrX=W/2-qrPx/2;
    var qrY=800;
    var pad=16;
    // QR background box
    ctx.fillStyle="rgba(250,249,245,0.95)";
    ctx.beginPath();
    var rx=qrX-pad,ry=qrY-pad,rw=qrPx+pad*2,rh=qrPx+pad*2;
    ctx.roundRect(rx,ry,rw,rh,16);
    ctx.fill();
    ctx.strokeStyle=S.sd;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,16);ctx.stroke();
    // QR modules
    ctx.fillStyle=S.s;
    for(var r=0;r<qrSize;r++){
      for(var c=0;c<qrSize;c++){
        if(mat.isDark(r,c)){
          ctx.fillRect(qrX+c*cell,qrY+r*cell,cell,cell);
        }
      }
    }
  }

  // 10. Stars ornament
  ctx.font="22px serif";
  ctx.fillStyle=S.sd;
  ctx.letterSpacing="20px";
  ctx.fillText("\u2726  \u2726  \u2726",W/2,1340);

  return {canvas:cvs,name:g.name};
}


// ---- Export functions ----
async function exportPDF(g){
  var res=await cardToCanvas(g);
  if(!res||!window.jspdf)return;
  var J=window.jspdf;
  var pdf=new J.jsPDF({orientation:"portrait",unit:"px",format:[res.canvas.width/2,res.canvas.height/2]});
  pdf.addImage(res.canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,res.canvas.width/2,res.canvas.height/2);
  pdf.save("invitation-"+res.name.replace(/\s+/g,"_")+".pdf");
}

window.startScan=async function(){
  // Stop any existing scan first
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  
  scanMsg=null;scanning=true;render();
  
  // Create persistent video element attached to body
  var oldVid=document.getElementById("_scanVid");
  if(oldVid)oldVid.parentNode.removeChild(oldVid);
  
  var vid=document.createElement("video");
  vid.id="_scanVid";
  vid.setAttribute("playsinline","true");
  vid.setAttribute("autoplay","true");
  vid.muted=true;
  vid.style.cssText="position:fixed;z-index:50;border-radius:10px;object-fit:cover;display:block;";
  document.body.appendChild(vid);
  
  // Position video over placeholder
  function positionVid(){
    if(isScan||staffMode){
      vid.style.left="0";vid.style.top="0";
      vid.style.width="100vw";vid.style.height="100vh";
    } else {
      var ph=document.getElementById("vidPlaceholder");
      if(ph){
        var r=ph.getBoundingClientRect();
        vid.style.left=r.left+"px";vid.style.top=r.top+"px";
        vid.style.width=r.width+"px";vid.style.height=r.height+"px";
      }

  }
  positionVid();
  window._posVid=setInterval(positionVid,200);
  // Staff mode: flip button overlay
  var oldOv=document.getElementById("_scanOv");if(oldOv)oldOv.remove();
  if(isScan||staffMode){
    var sov=document.createElement("div");
    sov.id="_scanOv";
    sov.style.cssText="position:fixed;inset:0;z-index:52;pointer-events:none;";
    var flipBtn='<button onclick="window.flipCamera()" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.5);border-radius:50%;width:52px;height:52px;color:white;font-size:22px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center">🔄</button>';
    var brackets='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:220px;height:220px;position:relative">'
      +'<div style="position:absolute;top:0;left:0;width:36px;height:36px;border-top:3px solid #9aaa70;border-left:3px solid #9aaa70"></div>'
      +'<div style="position:absolute;top:0;right:0;width:36px;height:36px;border-top:3px solid #9aaa70;border-right:3px solid #9aaa70"></div>'
      +'<div style="position:absolute;bottom:0;left:0;width:36px;height:36px;border-bottom:3px solid #9aaa70;border-left:3px solid #9aaa70"></div>'
      +'<div style="position:absolute;bottom:0;right:0;width:36px;height:36px;border-bottom:3px solid #9aaa70;border-right:3px solid #9aaa70"></div>'
      +'</div></div>';
    sov.innerHTML=flipBtn+brackets;
    document.body.appendChild(sov);
  }
  
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facingMode},width:{ideal:1920},height:{ideal:1080}}
    });
    vid.srcObject=stream;
    await vid.play();
    scanLoop(vid);
  }catch(e){
    clearInterval(window._posVid);
    vid.parentNode&&vid.parentNode.removeChild(vid);
    scanning=false;stream=null;
    scanMsg={t:"err",msg:"\u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0643\u0627\u0645\u064a\u0631\u0627"};
    render();
  }
};

window.stopScan=function(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  clearInterval(window._posVid);
  var v=document.getElementById("_scanVid");
  if(v)v.parentNode&&v.parentNode.removeChild(v);
  scanning=false;render();
};
function scanLoop(vid){
  if(!stream||!scanning)return;
  if(!vid)vid=document.getElementById("_scanVid");
  if(!vid)return;

  // Use native BarcodeDetector if available (Android Chrome - much more reliable)
  if(window.BarcodeDetector){
    var detector=new BarcodeDetector({formats:["qr_code"]});
    function detectLoop(){
      if(!stream||!scanning)return;
      if(vid.readyState<2){setTimeout(detectLoop,100);return;}
      detector.detect(vid).then(function(codes){
        if(!stream||!scanning)return;
        if(codes&&codes.length>0){
          handleScan(codes[0].rawValue);
        } else {
          raf=setTimeout(detectLoop,80);
        }
      }).catch(function(){
        raf=setTimeout(detectLoop,100);
      });
    }
    detectLoop();
    return;
  }

  // Fallback: jsQR
  function jsqrLoop(){
    if(!stream||!scanning)return;
    if(!vid)return;
    if(vid.readyState<2||vid.videoWidth===0){
      raf=requestAnimationFrame(jsqrLoop);return;
    }
    var W=vid.videoWidth,H=vid.videoHeight;
    var cvs=document.createElement("canvas");
    cvs.width=W;cvs.height=H;
    var ctx=cvs.getContext("2d");
    ctx.drawImage(vid,0,0,W,H);
    var code=window.jsQR&&window.jsQR(ctx.getImageData(0,0,W,H).data,W,H,{inversionAttempts:"attemptBoth"});
    if(code&&code.data){
      handleScan(code.data);
    } else {
      raf=requestAnimationFrame(jsqrLoop);
    }
  }
  jsqrLoop();
}

function handleScan(id){
  clearInterval(window._posVid);
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  var v=document.getElementById("_scanVid");
  if(v&&v.parentNode)v.parentNode.removeChild(v);
  if(raf){if(typeof raf==="number"&&raf>0)cancelAnimationFrame(raf);clearTimeout(raf);raf=null;}
  scanning=false;
  var g=guests.find(function(x){return x.id===id;});
  if(!g)scanMsg={t:"err",msg:"QR \u063a\u064a\u0631 \u0645\u0639\u0631\u0648\u0641"};
  else if(attendance[id])scanMsg={t:"dup",msg:"\u062a\u0645 \u0645\u0633\u062d\u0647 \u0645\u0633\u0628\u0642\u0627\u064b \u2014 \u0644\u0627 \u064a\u0645\u0643\u0646 \u0627\u0644\u062a\u0633\u062c\u064a\u0644 \u0645\u0631\u062a\u064a\u0646!",name:g.name,time:attendance[id]};
  else{attendance[id]=Date.now();save();scanMsg={t:"ok",msg:"\u062a\u0645 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062d\u0636\u0648\u0631",name:g.name};setTimeout(function(){if(window.showThankYou)window.showThankYou(g.name);},300);}
  render();
}



// ---- Toast ----
var tT=null;
function toast(msg,type){
  var el=document.getElementById("tst");
  if(!el){el=document.createElement("div");el.id="tst";document.body.appendChild(el);}
  el.textContent=msg;
  el.style.cssText="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:"
    +(type==="e"?"rgba(196,133,122,0.95)":type==="w"?"rgba(196,168,85,0.95)":"rgba(90,128,64,0.95)")
    +";color:white;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.15);white-space:nowrap;font-family:Tajawal,sans-serif;display:block";
  if(tT)clearTimeout(tT);
  tT=setTimeout(function(){el.style.display="none";},3000);
}

// Expose setters for inline handlers (ES module scope fix)
window.setGroom=function(v){cGroom=v;updateCardPreview();};
window.setBride=function(v){cBride=v;updateCardPreview();};
window.setDate=function(v){cDate=v;updateCardPreview();};
window.setPrefix=function(v){cPrefix=v;updateCardPreview();};
window.doSearch=function(v){search=v;render();};
window.doQSearch=function(v){qSearch=v;render();};
window.setFilter=function(v){window._rf=v;render();};


window.uploadLogoTheme=function(el){
  var f=el.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(e){
    cLogo=e.target.result;
    saveSettings();
    render();
    toast('\u062a\u0645 \u062a\u062d\u062f\u064a\u062b \u0627\u0644\u0634\u0639\u0627\u0631 \u0641\u064a \u062c\u0645\u064a\u0639 \u0627\u0644\u0635\u0641\u062d\u0627\u062a \u2713');
  };
  rd.readAsDataURL(f);
};

window.extractColorTheme=function(el){
  var f=el.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(e){
    var img=new Image();
    img.onload=async function(){
      var rgb=await extractColor(img);
      if(rgb){
        themeRGB=rgb;
        S=buildTheme(rgb.r,rgb.g,rgb.b);
        saveSettings();
        render();
        toast('\u062a\u0645 \u062a\u063a\u064a\u064a\u0631 \u0627\u0644\u062b\u064a\u0645 \u062a\u0644\u0642\u0627\u0626\u064a\u0627\u064b \u2713');
      }else{toast('\u062a\u0639\u0630\u0651\u0631 \u0627\u0633\u062a\u062e\u0631\u0627\u062c \u0627\u0644\u0644\u0648\u0646','w');}
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(f);
};

window.applyColorPreset=function(el){
  var r=parseInt(el.dataset.r),g=parseInt(el.dataset.g),b=parseInt(el.dataset.b);
  themeRGB={r:r,g:g,b:b};
  S=buildTheme(r,g,b);
  render();
};

window.applyTheme=function(){
  updateGateUI();
  saveSettings();
  toast('\u062a\u0645 \u062d\u0641\u0638 \u0627\u0644\u062b\u064a\u0645 \u0648\u062a\u0637\u0628\u064a\u0642\u0647 \u0639\u0644\u0649 \u062c\u0645\u064a\u0639 \u0627\u0644\u0623\u062c\u0647\u0632\u0629 \u2713');
};


render();
if(isScan||isList){setTimeout(function(){if(tab==="scanner"&&!scanning)window.startScan();},400);}

</script>

ont-family:Tajawal,sans-serif;font-size:13px;color:#c4857a;margin-bottom:8px"></div><button id="gateSaveBtn" onclick="_resetPW()" style="width:100%;background:linear-gradient(135deg,#7a9048,#4a5e2a);border:none;border-radius:12px;padding:13px;color:white;font-family:Tajawal,sans-serif;font-size:16px;font-weight:700;cursor:pointer">حفظ كلمة المرور</button></div><div style="margin-top:20px;font-family:Cinzel,serif;font-size:10px;color:rgba(154,170,112,0.4);letter-spacing:4px">&#10022; &nbsp; &#10022; &nbsp; &#10022;</div></div></div><script>var _DH="11ae661c",_EH="51a9bb5";function _h(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return(h>>>0).toString(16);}function _gh(){return localStorage.getItem("_pwh")||_DH;}function _unlock(){sessionStorage.setItem("_auth",_gh());document.getElementById("gate").style.display="none";}function _dologin(){var v=document.getElementById("pwIn").value;if(_h(v)===_gh()){_unlock();}else{document.getElementById("pwErr").style.display="block";document.getElementById("pwIn").value="";}}function _showForgot(){document.getElementById("loginView").style.display="none";document.getElementById("forgotView").style.display="block";document.getElementById("emErr").style.display="none";}function _showLogin(){document.getElementById("forgotView").style.display="none";document.getElementById("resetView").style.display="none";document.getElementById("loginView").style.display="block";}function _checkEmail(){var e=document.getElementById("emIn").value.trim().toLowerCase();if(_h(e)===_EH){document.getElementById("forgotView").style.display="none";document.getElementById("resetView").style.display="block";}else{document.getElementById("emErr").style.display="block";}}function _resetPW(){var p1=document.getElementById("np1").value,p2=document.getElementById("np2").value,err=document.getElementById("rstErr");if(p1.length<4){err.textContent="كلمة المرور قصيرة جداً";err.style.display="block";return;}if(p1!==p2){err.textContent="كلمتا المرور غير متطابقتين";err.style.display="block";return;}localStorage.setItem("_pwh",_h(p1));_unlock();}document.addEventListener("DOMContentLoaded",function(){if(sessionStorage.getItem("_auth")===_gh()){document.getElementById("gate").style.display="none";}var pi=document.getElementById("pwIn");if(pi)pi.addEventListener("keydown",function(e){if(e.key==="Enter")_dologin();});var ei=document.getElementById("emIn");if(ei)ei.addEventListener("keydown",function(e){if(e.key==="Enter")_checkEmail();});});</script>
